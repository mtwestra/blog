baseURL = "https://hiemsteed.nl/"
title = "Westra on AI"
theme = "PaperMod"

defaultContentLanguage = "nl"
defaultContentLanguageInSubdir = false

enableRobotsTXT = true
enableInlineShortcodes = true
buildDrafts = false

[pagination]
  pagerSize = 10

[services]
  [services.rss]
    limit = 20

[params]
  defaultTheme = "light"
  ShowReadingTime = false
  ShowCodeCopyButtons = true
  ShowToc = true
  ShowShareButtons = false

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]

[languages]
  [languages.nl]
    label = "Nederlands"
    locale = "nl-NL"
    weight = 1
    contentDir = "content/nl"
    [[languages.nl.menu.main]]
      name = ""
      pre = "<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' style='vertical-align:-2px'><path d='M4 11a9 9 0 0 1 9 9'/><path d='M4 4a16 16 0 0 1 16 16'/><circle cx='5' cy='19' r='1'/></svg>"
      title = "Abonneren"
      url = "/subscribe/"
      weight = 35
    [[languages.nl.menu.main]]
      name = "Blog"
      url = "/posts/"
      weight = 10
    [[languages.nl.menu.main]]
      name = "Over"
      url = "/about/"
      weight = 20
    [[languages.nl.menu.main]]
      name = "Contact"
      url = "/contact/"
      weight = 30

  [languages.en]
    label = "English"
    locale = "en-US"
    weight = 2
    contentDir = "content/en"
    [[languages.en.menu.main]]
      name = ""
      pre = "<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' style='vertical-align:-2px'><path d='M4 11a9 9 0 0 1 9 9'/><path d='M4 4a16 16 0 0 1 16 16'/><circle cx='5' cy='19' r='1'/></svg>"
      title = "Subscribe"
      url = "/en/subscribe/"
      weight = 35
    [[languages.en.menu.main]]
      name = "Blog"
      url = "/en/posts/"
      weight = 10
    [[languages.en.menu.main]]
      name = "About"
      url = "/en/about/"
      weight = 20
    [[languages.en.menu.main]]
      name = "Contact"
      url = "/en/contact/"
      weight = 30
