baseURL = "https://hiemsteed.nl/"
title = "Westra on AI"
theme = "PaperMod"

defaultContentLanguage = "nl"
defaultContentLanguageInSubdir = false

enableRobotsTXT = true
enableInlineShortcodes = true
buildDrafts = false

[pagination]
  pagerSize = 10

[services]
  [services.rss]
    limit = 20

[params]
  defaultTheme = "dark"
  ShowReadingTime = true
  ShowCodeCopyButtons = true
  ShowToc = true
  ShowShareButtons = false

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]

[languages]
  [languages.nl]
    label = "Nederlands"
    locale = "nl-NL"
    weight = 1
    contentDir = "content/nl"
    [[languages.nl.menu.main]]
      name = "Berichten"
      url = "/posts/"
      weight = 10
    [[languages.nl.menu.main]]
      name = "Over"
      url = "/about/"
      weight = 20

  [languages.en]
    label = "English"
    locale = "en-US"
    weight = 2
    contentDir = "content/en"
    [[languages.en.menu.main]]
      name = "Posts"
      url = "/en/posts/"
      weight = 10
    [[languages.en.menu.main]]
      name = "About"
      url = "/en/about/"
      weight = 20
